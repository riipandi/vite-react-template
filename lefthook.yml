assert_lefthook_installed: true

output:
  - meta
  - summary
  - empty_summary
  - execution_info
  - skips

pre-commit:
  parallel: true
  jobs:
    - name: format
      glob: '*.{js,ts,jsx,tsx,json}'
      run: pnpm oxfmt --write {staged_files}
      stage_fixed: true

    - name: lint
      glob: '*.{js,ts,jsx,tsx}'
      run: pnpm oxlint --fix {staged_files}
      stage_fixed: true

    - name: typecheck
      glob: '*.{ts,tsx,js,jsx,json}'
      run: pnpm tsc -b

    - name: test-unit
      glob: '*.{test,spec}.{ts,tsx}'
      run: pnpm vitest --run

pre-push:
  jobs:
    - name: audit
      run: pnpm audit --prod
